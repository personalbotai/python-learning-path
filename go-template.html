<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Learning Path - Interactive Tutorial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .code-editor {
            font-family: 'Fira Code', 'Consolas', monospace;
            tab-size: 4;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .code-editor:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .lesson-active {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white;
        }
        .terminal-output {
            background: #0a0a0a;
            color: #22c55e;
            font-family: 'Fira Code', monospace;
        }
        .progress-bar {
            transition: width 0.5s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <i class="fab fa-golang text-blue-500 text-3xl"></i>
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">
                        Go Learning Path
                    </h1>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-sm text-gray-400">
                        Progress: <span id="progress-text">0%</span>
                    </div>
                    <div class="w-48 bg-gray-700 rounded-full h-2.5 overflow-hidden">
                        <div id="progress-bar" class="progress-bar bg-gradient-to-r from-green-400 to-cyan-400 h-2.5 rounded-full" style="width: 0%"></div>
                    </div>
                    <button onclick="resetProgress()" class="px-3 py-1 text-xs bg-gray-700 hover:bg-gray-600 rounded transition">
                        Reset
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-6">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Sidebar - Lessons List -->
            <aside class="lg:col-span-1">
                <div class="bg-gray-800 rounded-lg p-4 sticky top-24">
                    <h2 class="text-lg font-semibold mb-4 flex items-center">
                        <i class="fas fa-list-ul mr-2 text-blue-400"></i>
                        Modul Belajar
                    </h2>
                    <nav id="lessons-nav" class="space-y-2">
                        <!-- Lessons will be populated by JS -->
                    </nav>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="lg:col-span-3 space-y-6">
                <!-- Current Lesson -->
                <section id="current-lesson" class="bg-gray-800 rounded-lg p-6">
                    <!-- Lesson content injected here -->
                </section>

                <!-- Code Editor & Terminal -->
                <section class="bg-gray-800 rounded-lg p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold">
                            <i class="fas fa-code mr-2 text-green-400"></i>
                            Editor Kode
                        </h3>
                        <div class="space-x-2">
                            <button onclick="runCode()" class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded font-medium transition flex items-center">
                                <i class="fas fa-play mr-2"></i> Jalankan
                            </button>
                            <button onclick="resetCode()" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 rounded font-medium transition">
                                <i class="fas fa-undo mr-2"></i> Reset
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <!-- Code Input -->
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-2">Kode Anda:</label>
                            <textarea id="code-editor" class="code-editor w-full h-80 p-4 rounded-lg border border-gray-700 text-sm" spellcheck="false"></textarea>
                        </div>

                        <!-- Terminal Output -->
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-2">Output:</label>
                            <div id="terminal-output" class="terminal-output w-full h-80 p-4 rounded-lg border border-gray-700 text-sm overflow-auto">
                                <span class="text-gray-500">// Output akan muncul di sini setelah Anda menekan "Jalankan"</span>
                            </div>
                        </div>
                    </div>

                    <div id="validation-msg" class="mt-4 p-3 rounded hidden"></div>
                </section>

                <!-- Quiz Section -->
                <section id="quiz-section" class="bg-gray-800 rounded-lg p-6 hidden">
                    <h3 class="text-lg font-semibold mb-4 flex items-center">
                        <i class="fas fa-question-circle mr-2 text-yellow-400"></i>
                        Quiz Sederhana
                    </h3>
                    <div id="quiz-content" class="space-y-4">
                        <!-- Quiz injected here -->
                    </div>
                    <button onclick="checkQuiz()" class="mt-4 px-6 py-2 bg-blue-600 hover:bg-blue-700 rounded font-medium transition">
                        Submit Jawaban
                    </button>
                </section>

                <!-- Navigation -->
                <div class="flex justify-between items-center">
                    <button id="prev-btn" onclick="prevLesson()" class="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-medium transition disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-arrow-left mr-2"></i> Sebelumnya
                    </button>
                    <button id="next-btn" onclick="nextLesson()" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition disabled:opacity-50 disabled:cursor-not-allowed">
                        Selanjutnya <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </main>
        </div>
    </div>

    <footer class="bg-gray-800 border-t border-gray-700 mt-8 py-6">
        <div class="container mx-auto px-4 text-center text-gray-400 text-sm">
            <p>Interactive Go Tutorial - Belajar Go dengan cara praktik langsung</p>
            <p class="mt-2">Dibuat dengan <i class="fas fa-heart text-red-500"></i> untuk developer Indonesia</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
